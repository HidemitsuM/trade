orchestrator:
  max_concurrent_agents: 8
  signal_timeout_ms: 5000
  heartbeat_interval_ms: 10000

risk:
  max_total_exposure_usd: 5000
  max_single_trade_usd: 500
  max_drawdown_pct: 10
  circuit_breaker_loss_usd: 200
  daily_loss_limit_usd: 300

simulation:
  enabled: true
  slippage_pct: 0.5
  fee_pct: 0.3

agents:
  arb-scanner:
    interval_ms: 5000
    min_profit_usd: 5
    chains: [solana, bsc]
  pump-sniper:
    interval_ms: 3000
    max_position_usd: 200
    max_open_positions: 3
  spread-farmer:
    interval_ms: 5000
    min_spread_pct: 2
    max_positions: 10
  whale-tracker:
    interval_ms: 10000
    min_whale_usd: 10000
  copy-trader:
    interval_ms: 2000
    max_copy_usd: 300
    copy_delay_ms: 2000
  news-edge:
    interval_ms: 30000
    sentiment_threshold: 0.7
  liquidity-hunter:
    interval_ms: 10000
    min_liquidity_change_pct: 5
  portfolio-guard:
    interval_ms: 15000
    stop_loss_pct: 8
    rebalance_threshold_pct: 5
