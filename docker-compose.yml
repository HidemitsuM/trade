services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      target: orchestrator
    environment:
      - SIMULATION=true
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/app/data/trade.db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "3000:3000"
    environment:
      - DB_PATH=/app/data/trade.db
    volumes:
      - ./data:/app/data
    depends_on:
      - orchestrator

  db-backup:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - orchestrator
    environment:
      - DB_BACKUP_RETENTION_DAYS=30
    volumes:
      - ./data:/data
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache sqlite
        sleep 60
        while true; do
          sh /backup-db.sh /data/trade.db /data/backups || echo "[WARNING] Backup failed, will retry in 6h"
          sleep 21600
        done

volumes:
  redis-data:
